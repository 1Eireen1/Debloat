<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DeepBloat">
<meta name="theme-color" content="#16191d">
<title>DeepBloat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #16191d; --surface: #1f2329; --surface-2: #272c34; --line: #333a44;
    --accent: #6DCFFB; --accent-dim: rgba(109,207,251,0.14);
    --text: #eef2f6; --text-dim: #8b95a3; --good: #5fd99a; --rest: #c8a35f; --water: #4fb6e8;
    --p: #ff8f6b; --f: #f2c14e; --c: #8fd14f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(109,207,251,0.10), transparent 60%),
      radial-gradient(700px 400px at -10% 110%, rgba(109,207,251,0.06), transparent 60%),
      var(--bg);
    color: var(--text); font-family: 'Inter', sans-serif;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased; overscroll-behavior-y: none;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 22px 18px 120px; }

  header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 18px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .logo { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(145deg, var(--accent), #3aa9e0); display: grid; place-items: center; flex-shrink: 0; box-shadow: 0 6px 20px rgba(109,207,251,0.35); }
  .logo svg { width: 22px; height: 22px; }
  h1 { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .tagline { font-size: 11px; color: var(--text-dim); margin-top: 1px; letter-spacing: 0.3px; }
  .today-pct { text-align: right; }
  .today-pct .num { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 26px; line-height: 1; }
  .today-pct .lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 12px 10px; margin-bottom: 6px; }
  .day { display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; padding: 4px 0; border-radius: 10px; transition: background 0.15s; }
  .day.active { background: var(--accent-dim); }
  .day .dname { font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; }
  .day.active .dname { color: var(--accent); }
  .ring { position: relative; width: 30px; height: 30px; }
  .ring svg { transform: rotate(-90deg); }
  .ring .pct-txt { position: absolute; inset: 0; display: grid; place-items: center; font-size: 9px; font-weight: 700; color: var(--text); }
  .day.rest .dname { color: var(--rest); }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 15px; margin-top: 12px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-head .t { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.4px; display: flex; align-items: center; gap: 8px; }
  .card-head .t svg { width: 16px; height: 16px; }
  .card-head .meta { font-size: 12px; color: var(--text-dim); }
  .link-btn { background: none; border: none; color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }

  /* MACROS */
  .cal-line { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .cal-line .big { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 22px; }
  .cal-line .goal { font-size: 12px; color: var(--text-dim); }
  .cal-line .rem { font-size: 11px; color: var(--text-dim); }
  .bar { height: 7px; border-radius: 5px; background: var(--surface-2); overflow: hidden; }
  .bar > div { height: 100%; border-radius: 5px; transition: width 0.3s; }
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 14px; }
  .macro { text-align: center; }
  .macro .mname { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 4px; }
  .macro .mval { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 5px; }
  .macro .mval small { font-weight: 400; color: var(--text-dim); font-size: 11px; }

  .food-list { margin-top: 14px; display: flex; flex-direction: column; gap: 7px; }
  .food { display: flex; align-items: center; gap: 10px; background: var(--surface-2); border-radius: 11px; padding: 10px 12px; }
  .food .fbody { flex: 1; min-width: 0; }
  .food .fname { font-size: 14px; font-weight: 600; }
  .food .fname .qty { color: var(--text-dim); font-weight: 400; }
  .food .fmac { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
  .food .fmac b { color: var(--text); font-weight: 600; }
  .food .fdel { width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px; border: none; background: transparent; color: var(--text-dim); font-size: 17px; cursor: pointer; }
  .food-empty { font-size: 13px; color: var(--text-dim); text-align: center; padding: 8px 0; }

  .food-form { margin-top: 12px; background: var(--surface-2); border-radius: 12px; padding: 12px; }
  .food-form input { width: 100%; background: var(--surface); border: 1px solid var(--line); color: var(--text); border-radius: 9px; padding: 10px 11px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
  .food-form input:focus { border-color: var(--accent); }
  .ff-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-top: 8px; }
  .ff-grid label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); display: block; margin-bottom: 3px; text-align: center; }
  .ff-grid input { padding: 9px 4px; text-align: center; font-size: 13px; }
  .ff-actions { display: flex; gap: 8px; margin-top: 10px; }
  .ff-actions button { flex: 1; border: none; border-radius: 10px; padding: 11px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; }
  .ff-add { background: var(--accent); color: #06243a; }
  .ff-cancel { background: transparent; border: 1px solid var(--line) !important; color: var(--text-dim); }
  .ff-add:active, .ff-cancel:active { transform: scale(0.97); }

  .goals-form { margin-top: 4px; }
  .goals-form .ff-grid { grid-template-columns: repeat(4, 1fr); }

  /* WATER */
  .glasses { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 13px; }
  .glass { width: 26px; height: 32px; border-radius: 4px 4px 7px 7px; border: 2px solid var(--line); position: relative; overflow: hidden; background: var(--surface-2); transition: border-color 0.2s; }
  .glass.full { border-color: var(--water); }
  .glass .fill { position: absolute; bottom: 0; left: 0; right: 0; height: 0; background: linear-gradient(var(--water), #2f8fc4); transition: height 0.25s; }
  .glass.full .fill { height: 100%; }
  .water-ctrl { display: flex; align-items: center; gap: 12px; }
  .water-ctrl .big { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface-2); color: var(--text); font-size: 24px; font-weight: 700; cursor: pointer; display: grid; place-items: center; }
  .water-ctrl .big:active { transform: scale(0.93); }
  .water-ctrl .count { flex: 1; text-align: center; }
  .water-ctrl .count b { font-family: 'Sora', sans-serif; font-size: 20px; }
  .water-ctrl .count .l { font-size: 12px; color: var(--text-dim); display: block; margin-top: 1px; }
  .goal-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 11px; font-size: 12px; color: var(--text-dim); }
  .goal-row button { background: var(--surface-2); border: 1px solid var(--line); color: var(--text-dim); border-radius: 7px; width: 24px; height: 24px; font-size: 14px; cursor: pointer; }

  /* WEIGH-IN */
  .wi-input { display: flex; gap: 8px; }
  .wi-input input { flex: 1; min-width: 0; background: var(--surface-2); border: 1px solid var(--line); color: var(--text); border-radius: 11px; padding: 12px 13px; font-size: 16px; font-family: 'Inter', sans-serif; outline: none; }
  .wi-input input:focus { border-color: var(--accent); }
  .wi-input button { background: var(--accent); color: #06243a; border: none; border-radius: 11px; padding: 0 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; }
  .wi-input button:active { transform: scale(0.96); }
  .wi-logged { margin-top: 11px; font-size: 13px; color: var(--text-dim); }
  .wi-logged b { color: var(--text); }
  .review { margin-top: 12px; padding: 13px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; border: 1px solid var(--line); background: var(--surface-2); }
  .review.alert { border-color: rgba(109,207,251,0.45); background: var(--accent-dim); }
  .review .head { font-weight: 700; display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
  .review .delta { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 800; }
  .review .down { color: var(--good); }
  .review .up { color: var(--rest); }
  .progbar { height: 5px; border-radius: 4px; background: var(--surface); overflow: hidden; margin: 9px 0 3px; }
  .progbar > div { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }

  .section-title { display: flex; align-items: center; gap: 8px; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); margin: 22px 4px 11px; }
  .section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .task { display: flex; align-items: center; gap: 13px; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 14px 15px; margin-bottom: 9px; cursor: pointer; transition: transform 0.08s, border-color 0.15s, background 0.15s; }
  .task:active { transform: scale(0.985); }
  .check { width: 24px; height: 24px; border-radius: 8px; flex-shrink: 0; border: 2px solid var(--line); display: grid; place-items: center; transition: all 0.18s; }
  .check svg { width: 13px; height: 13px; opacity: 0; transform: scale(0.5); transition: all 0.18s; }
  .task.done { border-color: rgba(95,217,154,0.35); background: rgba(95,217,154,0.06); }
  .task.done .check { background: var(--good); border-color: var(--good); }
  .task.done .check svg { opacity: 1; transform: scale(1); }
  .task .body { flex: 1; min-width: 0; }
  .task .label { font-size: 15px; font-weight: 500; transition: color 0.15s; }
  .task.done .label { color: var(--text-dim); text-decoration: line-through; text-decoration-color: rgba(139,149,163,0.5); }
  .task .sub { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
  .del { opacity: 0; width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px; border: none; background: transparent; color: var(--text-dim); font-size: 17px; cursor: pointer; display: grid; place-items: center; }
  .task:hover .del, .editing .del { opacity: 0.6; }

  .add-row { display: flex; gap: 8px; margin-top: 4px; }
  .add-row input { flex: 1; min-width: 0; background: var(--surface-2); border: 1px solid var(--line); color: var(--text); border-radius: 11px; padding: 12px 13px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
  .add-row input:focus { border-color: var(--accent); }
  .add-btn { background: var(--accent); color: #06243a; border: none; border-radius: 11px; width: 46px; font-size: 22px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
  .add-btn:active { transform: scale(0.94); }

  .rest-banner { background: rgba(200,163,95,0.1); border: 1px solid rgba(200,163,95,0.3); border-radius: 14px; padding: 16px; text-align: center; color: var(--rest); font-size: 14px; font-weight: 500; margin-top: 12px; }

  .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg) 70%, transparent); display: flex; justify-content: center; gap: 10px; }
  .ftr-btn { background: var(--surface); border: 1px solid var(--line); color: var(--text-dim); border-radius: 12px; padding: 11px 18px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 7px; }
  .ftr-btn.primary { color: var(--accent); border-color: rgba(109,207,251,0.4); }
  .ftr-btn:active { transform: scale(0.96); }
  .empty { text-align: center; color: var(--text-dim); font-size: 13px; padding: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#06243a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></div>
      <div><h1>Deep<span>Bloat</span></h1><div class="tagline">stay consistent, daily.</div></div>
    </div>
    <div class="today-pct"><div class="num" id="todayNum">0%</div><div class="lbl" id="todayLbl">today</div></div>
  </header>
  <div class="week" id="weekStrip"></div>
  <div id="content"></div>
</div>

<div class="footer">
  <button class="ftr-btn" id="editToggle">✎ Edit habits</button>
  <button class="ftr-btn primary" id="resetDay">↺ Reset day</button>
</div>

<script>
(function () {
  "use strict";
  var STORE_KEY = "deepbloat_v2";
  var DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var SECTIONS = ["Morning","Afternoon","Evening"];
  var ML_PER_GLASS = 250;

  var DEFAULT_TASKS = [
    { id: id(), section: "Morning",   label: "Breakfast (protein)", sub: "kick off the day's macros" },
    { id: id(), section: "Afternoon", label: "Weights workout", sub: "the daily non-negotiable" },
    { id: id(), section: "Afternoon", label: "Cardio: soccer / treadmill", sub: "eat back the burn" },
    { id: id(), section: "Evening",   label: "Log everything I ate", sub: "use the macros card" }
  ];

  function id() { return Math.random().toString(36).slice(2, 9); }

  var state = load();
  var selectedDay = todayIdx();
  var editing = false;
  var showFoodForm = false;
  var editingGoals = false;

  function load() {
    try { var raw = localStorage.getItem(STORE_KEY); if (raw) return migrate(JSON.parse(raw)); } catch (e) {}
    return base();
  }
  function base() {
    return { tasks: DEFAULT_TASKS, done: {}, restDay: 6, water: {}, waterGoal: 12, weighins: {},
             food: {}, goals: { cal: 1950, p: 147, f: 55, c: 215 } };
  }
  function migrate(s) {
    if (!s.water) s.water = {};
    if (!s.waterGoal) s.waterGoal = 12;
    if (!s.weighins) s.weighins = {};
    if (!s.food) s.food = {};
    if (!s.goals) s.goals = { cal: 1950, p: 147, f: 55, c: 215 };
    return s;
  }
  function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {} }

  function todayIdx() { var js = new Date().getDay(); return js === 0 ? 6 : js - 1; }
  function mondayDate() { var n = new Date(); var m = new Date(n); m.setDate(n.getDate() - todayIdx()); m.setHours(0,0,0,0); return m; }
  function dateForDay(i) { var m = mondayDate(); var d = new Date(m); d.setDate(m.getDate() + i); return ymd(d); }
  function ymd(d) { return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function parseYmd(s) { var p = s.split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
  function diffDays(a, b) { return Math.round((parseYmd(b) - parseYmd(a)) / 86400000); }

  function doneKey(d, t) { return d + ":" + t; }
  function isDone(d, t) { return !!state.done[doneKey(d, t)]; }
  function isRest(d) { return d === state.restDay; }
  function tasksFor(sec) { return state.tasks.filter(function (t) { return t.section === sec; }); }
  function dayProgress(d) {
    if (isRest(d)) return null;
    var total = state.tasks.length; if (!total) return 0;
    var c = 0; state.tasks.forEach(function (t) { if (isDone(d, t.id)) c++; });
    return Math.round((c / total) * 100);
  }

  var weekEl = document.getElementById("weekStrip");
  var contentEl = document.getElementById("content");
  var todayNumEl = document.getElementById("todayNum");
  var todayLblEl = document.getElementById("todayLbl");

  function ring(pct) {
    var r = 12, c = 2 * Math.PI * r, off = c - (pct / 100) * c;
    var col = pct === 100 ? "var(--good)" : "var(--accent)";
    return '<div class="ring"><svg width="30" height="30" viewBox="0 0 30 30">' +
      '<circle cx="15" cy="15" r="' + r + '" fill="none" stroke="var(--surface-2)" stroke-width="3"/>' +
      '<circle cx="15" cy="15" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="3" stroke-linecap="round" stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '"/>' +
      '</svg><div class="pct-txt">' + pct + '</div></div>';
  }

  function renderWeek() {
    weekEl.innerHTML = "";
    DAYS.forEach(function (name, i) {
      var d = document.createElement("div");
      d.className = "day" + (i === selectedDay ? " active" : "") + (isRest(i) ? " rest" : "");
      var inner = '<div class="dname">' + name + '</div>';
      if (isRest(i)) {
        inner += '<div class="ring"><svg width="30" height="30" viewBox="0 0 30 30"><circle cx="15" cy="15" r="12" fill="none" stroke="rgba(200,163,95,0.4)" stroke-width="3" stroke-dasharray="2 4"/></svg><div class="pct-txt" style="font-size:13px">∅</div></div>';
      } else { inner += ring(dayProgress(i)); }
      d.innerHTML = inner;
      d.onclick = function () {
        selectedDay = i; editing = false; showFoodForm = false; editingGoals = false;
        var et = document.getElementById("editToggle"); et.textContent = "✎ Edit habits"; et.classList.remove("primary");
        renderAll();
      };
      weekEl.appendChild(d);
    });
  }

  // ---------- MACROS / FOOD ----------
  function foodFor(date) { return state.food[date] || []; }
  function totals(date) {
    var t = { cal: 0, p: 0, f: 0, c: 0 };
    foodFor(date).forEach(function (e) {
      var q = e.qty || 1;
      t.cal += (e.cal || 0) * q; t.p += (e.p || 0) * q; t.f += (e.f || 0) * q; t.c += (e.c || 0) * q;
    });
    t.cal = Math.round(t.cal); t.p = Math.round(t.p); t.f = Math.round(t.f); t.c = Math.round(t.c);
    return t;
  }
  function num(v) { var n = parseFloat(v); return isNaN(n) ? 0 : n; }
  function fmtQty(q) { return q === 1 ? "" : ' <span class="qty">×' + (Math.round(q * 100) / 100) + '</span>'; }

  function macroCard() {
    var date = dateForDay(selectedDay);
    var g = state.goals, t = totals(date);
    var c = document.createElement("div");
    c.className = "card";

    var head = '<div class="card-head"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3v18M4 8h6M10 3v18M16 3c-1.5 2-1.5 5 0 7v11"/></svg>Macros</div>' +
      '<button class="link-btn" id="goalsBtn">' + (editingGoals ? "Close" : "Goals") + '</button></div>';

    if (editingGoals) {
      c.innerHTML = head +
        '<div class="goals-form"><div class="ff-grid">' +
        '<div><label>Cal</label><input id="g_cal" type="number" inputmode="numeric" value="' + g.cal + '"></div>' +
        '<div><label>Protein</label><input id="g_p" type="number" inputmode="numeric" value="' + g.p + '"></div>' +
        '<div><label>Fat</label><input id="g_f" type="number" inputmode="numeric" value="' + g.f + '"></div>' +
        '<div><label>Carbs</label><input id="g_c" type="number" inputmode="numeric" value="' + g.c + '"></div>' +
        '</div><div class="ff-actions"><button class="ff-add" id="g_save">Save goals</button></div></div>';
      c.querySelector("#goalsBtn").onclick = function () { editingGoals = false; renderContent(); };
      c.querySelector("#g_save").onclick = function () {
        state.goals = { cal: num(c.querySelector("#g_cal").value), p: num(c.querySelector("#g_p").value),
                        f: num(c.querySelector("#g_f").value), c: num(c.querySelector("#g_c").value) };
        editingGoals = false; save(); renderContent();
      };
      return c;
    }

    function bar(val, goal, col) {
      var pct = goal > 0 ? Math.min(100, Math.round(val / goal * 100)) : 0;
      var over = val > goal && goal > 0;
      return '<div class="bar"><div style="width:' + pct + '%;background:' + (over ? 'var(--rest)' : col) + '"></div></div>';
    }
    var remain = g.cal - t.cal;
    var inner = head +
      '<div class="cal-line"><span class="big">' + t.cal + '<span class="goal"> / ' + g.cal + ' cal</span></span>' +
      '<span class="rem">' + (remain >= 0 ? remain + ' left' : Math.abs(remain) + ' over') + '</span></div>' +
      bar(t.cal, g.cal, 'var(--accent)') +
      '<div class="macro-grid">' +
        '<div class="macro"><div class="mname">Protein</div><div class="mval">' + t.p + '<small> / ' + g.p + 'g</small></div>' + bar(t.p, g.p, 'var(--p)') + '</div>' +
        '<div class="macro"><div class="mname">Fat</div><div class="mval">' + t.f + '<small> / ' + g.f + 'g</small></div>' + bar(t.f, g.f, 'var(--f)') + '</div>' +
        '<div class="macro"><div class="mname">Carbs</div><div class="mval">' + t.c + '<small> / ' + g.c + 'g</small></div>' + bar(t.c, g.c, 'var(--c)') + '</div>' +
      '</div>';

    // food list
    var list = foodFor(date);
    inner += '<div class="food-list">';
    if (!list.length) inner += '<div class="food-empty">No food logged yet today.</div>';
    inner += '</div>';

    if (showFoodForm) {
      inner += '<div class="food-form">' +
        '<input id="f_name" type="text" placeholder="Food name (e.g. Chicken & rice)">' +
        '<div class="ff-grid">' +
          '<div><label>Servings</label><input id="f_qty" type="number" inputmode="decimal" step="0.5" value="1"></div>' +
          '<div><label>Cal</label><input id="f_cal" type="number" inputmode="numeric" placeholder="0"></div>' +
          '<div><label>Protein</label><input id="f_p" type="number" inputmode="numeric" placeholder="0"></div>' +
          '<div><label>Fat</label><input id="f_f" type="number" inputmode="numeric" placeholder="0"></div>' +
          '<div><label>Carbs</label><input id="f_c" type="number" inputmode="numeric" placeholder="0"></div>' +
        '</div>' +
        '<div class="ff-actions"><button class="ff-cancel" id="f_cancel">Cancel</button><button class="ff-add" id="f_add">Add food</button></div>' +
        '</div>';
    } else {
      inner += '<div class="ff-actions" style="margin-top:12px"><button class="ff-add" id="f_open" style="flex:1;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;background:var(--accent);color:#06243a">+ Add food</button></div>';
    }
    c.innerHTML = inner;

    c.querySelector("#goalsBtn").onclick = function () { editingGoals = true; renderContent(); };

    // render food rows as nodes (for delete handlers)
    var listEl = c.querySelector(".food-list");
    if (list.length) {
      listEl.innerHTML = "";
      list.forEach(function (e) {
        var q = e.qty || 1;
        var row = document.createElement("div");
        row.className = "food";
        row.innerHTML = '<div class="fbody"><div class="fname">' + esc(e.name) + fmtQty(q) + '</div>' +
          '<div class="fmac"><b>' + Math.round((e.cal||0)*q) + '</b> cal · ' +
          '<b>' + Math.round((e.p||0)*q) + '</b>p · <b>' + Math.round((e.f||0)*q) + '</b>f · <b>' + Math.round((e.c||0)*q) + '</b>c</div></div>' +
          '<button class="fdel">×</button>';
        row.querySelector(".fdel").onclick = function () {
          state.food[date] = foodFor(date).filter(function (x) { return x.id !== e.id; });
          if (!state.food[date].length) delete state.food[date];
          save(); renderContent();
        };
        listEl.appendChild(row);
      });
    }

    if (showFoodForm) {
      var add = function () {
        var name = c.querySelector("#f_name").value.trim();
        if (!name) { c.querySelector("#f_name").focus(); return; }
        var entry = { id: id(), name: name, qty: num(c.querySelector("#f_qty").value) || 1,
          cal: num(c.querySelector("#f_cal").value), p: num(c.querySelector("#f_p").value),
          f: num(c.querySelector("#f_f").value), c: num(c.querySelector("#f_c").value) };
        if (!state.food[date]) state.food[date] = [];
        state.food[date].push(entry);
        save(); showFoodForm = false; renderContent();
      };
      c.querySelector("#f_add").onclick = add;
      c.querySelector("#f_cancel").onclick = function () { showFoodForm = false; renderContent(); };
    } else {
      c.querySelector("#f_open").onclick = function () { showFoodForm = true; renderContent(); };
    }
    return c;
  }

  // ---------- WATER ----------
  function waterCard() {
    var date = dateForDay(selectedDay);
    var n = state.water[date] || 0, goal = state.waterGoal;
    var liters = (n * ML_PER_GLASS / 1000).toFixed(2);
    var glasses = "";
    for (var i = 0; i < goal; i++) glasses += '<div class="glass' + (i < n ? ' full' : '') + '"><div class="fill"></div></div>';
    var c = document.createElement("div");
    c.className = "card";
    c.innerHTML =
      '<div class="card-head"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="var(--water)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5S5 10 5 15a7 7 0 0 0 14 0c0-5-7-12.5-7-12.5z"/></svg>Water</div><div class="meta">' + n + ' / ' + goal + ' glasses</div></div>' +
      '<div class="glasses">' + glasses + '</div>' +
      '<div class="water-ctrl"><button class="big" data-w="-1">−</button>' +
      '<div class="count"><b>' + liters + ' L</b><span class="l">' + ML_PER_GLASS + ' ml per glass</span></div>' +
      '<button class="big" data-w="1">+</button></div>' +
      '<div class="goal-row">Goal <button data-g="-1">−</button> ' + goal + ' glasses <button data-g="1">+</button></div>';
    c.querySelectorAll("[data-w]").forEach(function (b) {
      b.onclick = function () { var cur = state.water[date] || 0; cur += parseInt(b.getAttribute("data-w"), 10); if (cur < 0) cur = 0; state.water[date] = cur; save(); renderContent(); };
    });
    c.querySelectorAll("[data-g]").forEach(function (b) {
      b.onclick = function () { state.waterGoal += parseInt(b.getAttribute("data-g"), 10); if (state.waterGoal < 1) state.waterGoal = 1; if (state.waterGoal > 24) state.waterGoal = 24; save(); renderContent(); };
    });
    return c;
  }

  // ---------- WEIGH-IN ----------
  function sortedWeighins() { return Object.keys(state.weighins).sort().map(function (d) { return { date: d, w: state.weighins[d] }; }); }
  function weighinCard() {
    var date = dateForDay(selectedDay), logged = state.weighins[date];
    var c = document.createElement("div");
    c.className = "card";
    var loggedHtml = (logged != null) ? '<div class="wi-logged">Logged for ' + DAYS[selectedDay] + ': <b>' + logged + ' lb</b></div>' : '';
    c.innerHTML =
      '<div class="card-head"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 0 0-9 9h18a9 9 0 0 0-9-9z"/><path d="M12 12l3-4"/></svg>Morning weigh-in</div></div>' +
      '<div class="wi-input"><input type="number" inputmode="decimal" step="0.1" placeholder="' + (logged != null ? logged : 'e.g. 147.0') + '" /><button>Save</button></div>' +
      loggedHtml + '<div id="reviewSlot"></div>';
    var inp = c.querySelector("input"), btn = c.querySelector("button");
    btn.onclick = function () { var v = parseFloat(inp.value); if (isNaN(v) || v <= 0) return; state.weighins[date] = Math.round(v * 10) / 10; save(); renderContent(); };
    inp.onkeydown = function (e) { if (e.key === "Enter") btn.onclick(); };
    setTimeout(function () { var slot = c.querySelector("#reviewSlot"); if (slot) slot.appendChild(reviewNode()); }, 0);
    return c;
  }
  function reviewNode() {
    var entries = sortedWeighins(), box = document.createElement("div");
    if (entries.length === 0) { box.className = "review"; box.innerHTML = '<div class="head">📊 Track your trend</div>Log your weight each morning. After 7 days I\'ll show how much you\'ve lost or gained.'; return box; }
    var first = entries[0], latest = entries[entries.length - 1];
    var spanFirst = diffDays(first.date, latest.date), today = ymd(new Date());
    var spanToday = diffDays(first.date, today), dayN = Math.max(spanToday + 1, entries.length);
    if (spanFirst < 7) {
      box.className = "review"; var prog = Math.min(dayN, 7);
      box.innerHTML = '<div class="head">📊 Day ' + prog + ' of 7</div>Keep logging each morning. ' + (7 - prog > 0 ? (7 - prog) + ' more day' + (7 - prog === 1 ? '' : 's') + ' until your first check.' : 'Time to check below!') + '<div class="progbar"><div style="width:' + Math.round(prog / 7 * 100) + '%"></div></div>';
      return box;
    }
    var target = parseYmd(latest.date); target.setDate(target.getDate() - 7); var targetStr = ymd(target);
    var bse = null, bestGap = 999;
    entries.forEach(function (e) { var gp = Math.abs(diffDays(e.date, targetStr)); if (gp < bestGap && e.date !== latest.date) { bestGap = gp; bse = e; } });
    if (!bse) bse = first;
    var delta = Math.round((latest.w - bse.w) * 10) / 10, days = diffDays(bse.date, latest.date);
    var dir = delta < 0 ? "down" : (delta > 0 ? "up" : ""), word = delta < 0 ? "down" : (delta > 0 ? "up" : "even"), abs = Math.abs(delta).toFixed(1);
    var note, perWeek = days > 0 ? (delta / days) * 7 : delta;
    if (delta < 0) {
      if (Math.abs(perWeek) > 1.2) note = "That's faster than your 0.5 lb/week goal — eat back a touch more so you keep muscle.";
      else if (Math.abs(perWeek) >= 0.3) note = "Right on pace for your ~0.5 lb/week cut. Hold steady.";
      else note = "Slow loss — solid for keeping muscle. Nudge calories down ~100 if you want it quicker.";
    } else if (delta > 0) { note = "Up over the week. If you're cutting, trim ~150–200 cal/day or double-check the calories you eat back."; }
    else { note = "Holding steady. If you want to lose, drop ~150 cal from your base."; }
    box.className = "review alert";
    box.innerHTML = '<div class="head">📊 Your 7-day check</div>Weight is <span class="delta ' + dir + '">' + word + ' ' + abs + ' lb</span> over the last ' + days + ' days (' + bse.w + ' → ' + latest.w + ').<br>' + note;
    return box;
  }

  // ---------- TASKS ----------
  function taskNode(t) {
    var done = isDone(selectedDay, t.id);
    var el = document.createElement("div");
    el.className = "task" + (done ? " done" : "") + (editing ? " editing" : "");
    el.innerHTML = '<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#06243a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></div>' +
      '<div class="body"><div class="label">' + esc(t.label) + '</div>' + (t.sub ? '<div class="sub">' + esc(t.sub) + '</div>' : '') + '</div><button class="del" aria-label="delete">×</button>';
    el.onclick = function (e) {
      if (e.target.closest(".del")) { state.tasks = state.tasks.filter(function (x) { return x.id !== t.id; }); save(); renderAll(); return; }
      var k = doneKey(selectedDay, t.id);
      if (state.done[k]) delete state.done[k]; else state.done[k] = true;
      save(); renderWeek(); renderHeader(); el.classList.toggle("done");
    };
    return el;
  }

  function renderContent() {
    contentEl.innerHTML = "";
    contentEl.appendChild(weighinCard());
    contentEl.appendChild(macroCard());
    contentEl.appendChild(waterCard());
    if (isRest(selectedDay)) {
      var b = document.createElement("div"); b.className = "rest-banner";
      b.textContent = "Rest day. Recover, eat, let the muscle rebuild. 💤";
      contentEl.appendChild(b); return;
    }
    SECTIONS.forEach(function (sec) {
      var title = document.createElement("div"); title.className = "section-title";
      title.innerHTML = '<span class="dot"></span>' + sec; contentEl.appendChild(title);
      var list = tasksFor(sec);
      if (!list.length) { var em = document.createElement("div"); em.className = "empty"; em.textContent = "Nothing here yet."; contentEl.appendChild(em); }
      else { list.forEach(function (t) { contentEl.appendChild(taskNode(t)); }); }
      if (editing) {
        var row = document.createElement("div"); row.className = "add-row";
        row.innerHTML = '<input type="text" placeholder="Add to ' + sec + '..." /><button class="add-btn">+</button>';
        var inp = row.querySelector("input"), btn = row.querySelector(".add-btn");
        function add() { var v = inp.value.trim(); if (!v) return; state.tasks.push({ id: id(), section: sec, label: v, sub: "" }); save(); renderAll(); }
        btn.onclick = add; inp.onkeydown = function (e) { if (e.key === "Enter") add(); };
        contentEl.appendChild(row);
      }
    });
  }

  function renderHeader() {
    if (isRest(selectedDay)) { todayNumEl.textContent = "∅"; todayNumEl.style.color = "var(--rest)"; todayLblEl.textContent = "rest"; return; }
    var p = dayProgress(selectedDay);
    todayNumEl.textContent = p + "%"; todayNumEl.style.color = p === 100 ? "var(--good)" : "var(--text)";
    todayLblEl.textContent = (selectedDay === todayIdx()) ? "today" : DAYS[selectedDay].toLowerCase();
  }
  function renderAll() { renderWeek(); renderContent(); renderHeader(); }
  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

  document.getElementById("editToggle").onclick = function () {
    editing = !editing; this.textContent = editing ? "✓ Done" : "✎ Edit habits";
    this.classList.toggle("primary", editing); renderContent();
  };
  document.getElementById("resetDay").onclick = function () {
    if (!confirm("Clear all task checkmarks for " + DAYS[selectedDay] + "?")) return;
    state.tasks.forEach(function (t) { delete state.done[doneKey(selectedDay, t.id)]; });
    save(); renderAll();
  };

  (function () {
    var stamp = ymd(mondayDate());
    if (state.weekStamp !== stamp) { state.done = {}; state.water = {}; state.food = {}; state.weekStamp = stamp; save(); }
  })();

  renderAll();
})();
</script>
</body>
</html>
