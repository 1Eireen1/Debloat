<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DeepBloat">
<meta name="theme-color" content="#16191d">
<title>DeepBloat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode" defer></script>
<style>
  :root {
    --bg: #16191d; --surface: #1f2329; --surface-2: #272c34; --line: #333a44;
    --accent: #6DCFFB; --accent-dim: rgba(109,207,251,0.14);
    --text: #eef2f6; --text-dim: #8b95a3; --good: #5fd99a; --rest: #c8a35f; --water: #4fb6e8;
    --p: #ff8f6b; --f: #f2c14e; --c: #8fd14f; --na: #a98ff5; --k: #f06ec0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(109,207,251,0.10), transparent 60%),
      radial-gradient(700px 400px at -10% 110%, rgba(109,207,251,0.06), transparent 60%),
      var(--bg);
    color: var(--text); font-family: 'Inter', sans-serif;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased; overscroll-behavior-y: none;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 22px 18px 100px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .logo { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(145deg, var(--accent), #3aa9e0); display: grid; place-items: center; flex-shrink: 0; box-shadow: 0 6px 20px rgba(109,207,251,0.35); }
  .logo svg { width: 22px; height: 22px; }
  h1 { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .tagline { font-size: 11px; color: var(--text-dim); margin-top: 1px; letter-spacing: 0.3px; }
  .gear-btn { background: var(--surface); border: 1px solid var(--line); color: var(--text-dim); border-radius: 11px; width: 40px; height: 40px; cursor: pointer; display: grid; place-items: center; }
  .gear-btn:active { transform: scale(0.94); }
  .gear-btn svg { width: 18px; height: 18px; }

  .page-title { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 24px; margin-bottom: 4px; letter-spacing: -0.5px; }
  .page-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }

  .week-nav { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .nav-btn { background: var(--surface); border: 1px solid var(--line); color: var(--text); border-radius: 11px; width: 38px; height: 38px; font-size: 20px; cursor: pointer; display: grid; place-items: center; font-family: 'Inter', sans-serif; flex-shrink: 0; }
  .nav-btn:active { transform: scale(0.94); }
  .wk-label { flex: 1; text-align: center; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13px; color: var(--text-dim); cursor: pointer; padding: 8px; border-radius: 10px; transition: all 0.15s; }
  .wk-label.current { color: var(--accent); }
  .wk-label .sub { display: block; font-size: 10px; font-weight: 500; color: var(--text-dim); margin-top: 1px; letter-spacing: 0.3px; }
  .wk-label:active { background: var(--surface-2); }

  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 12px 10px; margin-bottom: 12px; }
  .day { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 4px 0; border-radius: 10px; transition: background 0.15s; }
  .day.active { background: var(--accent-dim); }
  .day .dname { font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; }
  .day.active .dname { color: var(--accent); }
  .day .dnum { font-size: 11px; color: var(--text-dim); font-weight: 500; }
  .day.today .dname, .day.today .dnum { color: var(--accent); font-weight: 700; }
  .ring { position: relative; width: 28px; height: 28px; }
  .ring svg { transform: rotate(-90deg); }
  .ring .pct-txt { position: absolute; inset: 0; display: grid; place-items: center; font-size: 9px; font-weight: 700; color: var(--text); }
  .day.rest .dname { color: var(--rest); }

  .quick-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .quick-tile { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 13px 10px; text-align: center; cursor: pointer; transition: transform 0.08s, border-color 0.15s; }
  .quick-tile:active { transform: scale(0.97); }
  .quick-tile .qlabel { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 6px; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .quick-tile .qlabel svg { width: 11px; height: 11px; }
  .quick-tile .qvalue { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 18px; line-height: 1.1; }
  .quick-tile .qvalue small { font-weight: 400; color: var(--text-dim); font-size: 11px; display: block; margin-top: 2px; }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 15px; margin-top: 12px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
  .card-head .t { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.4px; display: flex; align-items: center; gap: 8px; flex: 1; }
  .card-head .t svg { width: 16px; height: 16px; }
  .card-head .meta { font-size: 12px; color: var(--text-dim); }
  .link-btn { background: none; border: none; color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; padding: 4px 6px; }

  .cal-line { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .cal-line .big { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 22px; }
  .cal-line .goal { font-size: 12px; color: var(--text-dim); font-weight: 400; }
  .cal-line .rem { font-size: 11px; color: var(--text-dim); }
  .bar { height: 7px; border-radius: 5px; background: var(--surface-2); overflow: hidden; }
  .bar > div { height: 100%; border-radius: 5px; transition: width 0.3s; }
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 14px; }
  .macro { text-align: center; }
  .macro .mname { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 4px; }
  .macro .mval { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 5px; }
  .macro .mval small { font-weight: 400; color: var(--text-dim); font-size: 11px; }
  .micro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }

  .food-list { margin-top: 14px; display: flex; flex-direction: column; gap: 7px; }
  .food { display: flex; align-items: center; gap: 10px; background: var(--surface-2); border-radius: 11px; padding: 10px 12px; }
  .food .fbody { flex: 1; min-width: 0; }
  .food .fname { font-size: 14px; font-weight: 600; }
  .food .fname .qty { color: var(--text-dim); font-weight: 400; }
  .food .fmac { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
  .food .fmac b { color: var(--text); font-weight: 600; }
  .food .fmic { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
  .food .fdel { width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px; border: none; background: transparent; color: var(--text-dim); font-size: 17px; cursor: pointer; }
  .food-empty { font-size: 13px; color: var(--text-dim); text-align: center; padding: 8px 0; }

  .food-form { margin-top: 12px; background: var(--surface-2); border-radius: 12px; padding: 12px; }
  .photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .photo-btn { background: linear-gradient(135deg, var(--accent), #3aa9e0); color: #06243a; border: none; border-radius: 10px; padding: 11px 8px; font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .photo-btn.alt { background: linear-gradient(135deg, #c8a35f, #a07d3a); color: #2a1f0d; }
  .photo-btn:active { transform: scale(0.97); }
  .photo-btn svg { width: 14px; height: 14px; }
  .photo-status { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; padding: 8px 10px; background: var(--surface); border-radius: 8px; }
  .photo-status.err { color: #ff8f6b; }
  .photo-status.ok { color: var(--good); }
  .food-form input { width: 100%; background: var(--surface); border: 1px solid var(--line); color: var(--text); border-radius: 9px; padding: 10px 11px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
  .food-form input:focus { border-color: var(--accent); }
  .ff-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-top: 8px; }
  .ff-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 7px; }
  .ff-grid label, .ff-grid-2 label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); display: block; margin-bottom: 3px; text-align: center; }
  .ff-grid input, .ff-grid-2 input { padding: 9px 4px; text-align: center; font-size: 13px; }
  .ff-actions { display: flex; gap: 8px; margin-top: 10px; }
  .ff-actions button { flex: 1; border: none; border-radius: 10px; padding: 11px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; }
  .ff-add { background: var(--accent); color: #06243a; }
  .ff-cancel { background: transparent; border: 1px solid var(--line) !important; color: var(--text-dim); }

  .scan-modal { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; }
  .scan-head { padding: 15px 18px calc(15px + env(safe-area-inset-top)) 18px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; }
  .scan-head h3 { font-family: 'Sora', sans-serif; font-size: 15px; color: #fff; }
  .scan-head button { background: transparent; border: 1px solid var(--line); color: #fff; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  #reader { flex: 1; background: #000; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  .scan-hint { padding: 14px 18px calc(14px + env(safe-area-inset-bottom)); background: rgba(0,0,0,0.8); color: var(--text-dim); font-size: 13px; text-align: center; }

  .glasses { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 13px; }
  .glass { width: 26px; height: 32px; border-radius: 4px 4px 7px 7px; border: 2px solid var(--line); position: relative; overflow: hidden; background: var(--surface-2); transition: border-color 0.2s; }
  .glass.full { border-color: var(--water); }
  .glass .fill { position: absolute; bottom: 0; left: 0; right: 0; height: 0; background: linear-gradient(var(--water), #2f8fc4); transition: height 0.25s; }
  .glass.full .fill { height: 100%; }
  .water-ctrl { display: flex; align-items: center; gap: 12px; }
  .water-ctrl .big { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface-2); color: var(--text); font-size: 24px; font-weight: 700; cursor: pointer; display: grid; place-items: center; }
  .water-ctrl .big:active { transform: scale(0.93); }
  .water-ctrl .count { flex: 1; text-align: center; }
  .water-ctrl .count b { font-family: 'Sora', sans-serif; font-size: 20px; }
  .water-ctrl .count .l { font-size: 12px; color: var(--text-dim); display: block; margin-top: 1px; }

  .wi-input { display: flex; gap: 8px; }
  .wi-input input { flex: 1; min-width: 0; background: var(--surface-2); border: 1px solid var(--line); color: var(--text); border-radius: 11px; padding: 14px; font-size: 18px; font-family: 'Inter', sans-serif; outline: none; font-weight: 600; }
  .wi-input input:focus { border-color: var(--accent); }
  .wi-input button { background: var(--accent); color: #06243a; border: none; border-radius: 11px; padding: 0 20px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .wi-input button:active { transform: scale(0.96); }
  .wi-logged { margin-top: 11px; font-size: 13px; color: var(--text-dim); }
  .wi-logged b { color: var(--text); }
  .review { margin-top: 12px; padding: 13px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; border: 1px solid var(--line); background: var(--surface-2); }
  .review.alert { border-color: rgba(109,207,251,0.45); background: var(--accent-dim); }
  .review .head { font-weight: 700; display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
  .review .delta { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 800; }
  .review .down { color: var(--good); }
  .review .up { color: var(--rest); }
  .progbar { height: 5px; border-radius: 4px; background: var(--surface); overflow: hidden; margin: 9px 0 3px; }
  .progbar > div { height: 100%; background: var(--accent); border-radius: 4px; }

  .chart-card { padding: 15px 10px 10px; }
  .chart-svg { width: 100%; height: 160px; }
  .chart-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; padding: 0 5px; }
  .chart-stat { text-align: center; }
  .chart-stat .cl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .chart-stat .cv { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; margin-top: 3px; }

  .hist-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 13px; background: var(--surface-2); border-radius: 10px; margin-bottom: 6px; }
  .hist-row .hdate { font-size: 13px; color: var(--text-dim); }
  .hist-row .hw { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; }
  .hist-row .hdel { background: transparent; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; padding: 0 0 0 10px; }

  .section-title { display: flex; align-items: center; gap: 8px; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); margin: 22px 4px 11px; }
  .section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .task { display: flex; align-items: center; gap: 13px; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 14px 15px; margin-bottom: 9px; cursor: pointer; transition: transform 0.08s, border-color 0.15s, background 0.15s; }
  .task:active { transform: scale(0.985); }
  .check { width: 24px; height: 24px; border-radius: 8px; flex-shrink: 0; border: 2px solid var(--line); display: grid; place-items: center; transition: all 0.18s; }
  .check svg { width: 13px; height: 13px; opacity: 0; transform: scale(0.5); transition: all 0.18s; }
  .task.done { border-color: rgba(95,217,154,0.35); background: rgba(95,217,154,0.06); }
  .task.done .check { background: var(--good); border-color: var(--good); }
  .task.done .check svg { opacity: 1; transform: scale(1); }
  .task .body { flex: 1; min-width: 0; }
  .task .label { font-size: 15px; font-weight: 500; }
  .task.done .label { color: var(--text-dim); text-decoration: line-through; }
  .task .sub { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
  .del { opacity: 0; width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px; border: none; background: transparent; color: var(--text-dim); font-size: 17px; cursor: pointer; }
  .editing .del { opacity: 0.6; }

  .add-row { display: flex; gap: 8px; margin-top: 4px; }
  .add-row input { flex: 1; min-width: 0; background: var(--surface-2); border: 1px solid var(--line); color: var(--text); border-radius: 11px; padding: 12px 13px; font-size: 14px; outline: none; }
  .add-row input:focus { border-color: var(--accent); }
  .add-btn { background: var(--accent); color: #06243a; border: none; border-radius: 11px; width: 46px; font-size: 22px; font-weight: 700; cursor: pointer; }

  .rest-banner { background: rgba(200,163,95,0.1); border: 1px solid rgba(200,163,95,0.3); border-radius: 14px; padding: 16px; text-align: center; color: var(--rest); font-size: 14px; font-weight: 500; margin-top: 12px; }

  .action-row { display: flex; gap: 10px; margin-top: 20px; }
  .action-row button { flex: 1; background: var(--surface); border: 1px solid var(--line); color: var(--text-dim); border-radius: 12px; padding: 12px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }
  .action-row button.primary { color: var(--accent); border-color: rgba(109,207,251,0.4); }

  /* TAB BAR */
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(31,35,41,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(--line); padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); display: flex; z-index: 50; }
  .tab-btn { flex: 1; background: none; border: none; color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; padding: 6px 0; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; letter-spacing: 0.3px; }
  .tab-btn svg { width: 22px; height: 22px; transition: all 0.15s; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn:active { transform: scale(0.94); }

  /* SETTINGS MODAL */
  .settings-modal { position: fixed; inset: 0; background: var(--bg); z-index: 200; overflow-y: auto; padding-top: env(safe-area-inset-top); }
  .settings-modal .wrap { padding-bottom: 40px; }
  .settings-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .settings-head h2 { font-family: 'Sora', sans-serif; font-size: 22px; }
  .settings-section { margin-top: 22px; }
  .settings-section h3 { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); margin-bottom: 10px; padding: 0 4px; }
  .settings-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--line); }
  .setting-row:last-child { border-bottom: none; }
  .setting-row .sl { font-size: 14px; }
  .setting-row .sv { font-size: 13px; color: var(--text-dim); }
  .setting-row button { background: var(--surface-2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  .setting-row .stepper { display: flex; align-items: center; gap: 8px; }
  .setting-row .stepper button { width: 28px; height: 28px; padding: 0; font-size: 16px; font-weight: 700; }
  .goals-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .goals-fields > div { display: flex; align-items: center; justify-content: space-between; padding: 9px 11px; background: var(--surface-2); border-radius: 10px; }
  .goals-fields label { font-size: 13px; }
  .goals-fields input { width: 80px; background: var(--surface); border: 1px solid var(--line); color: var(--text); border-radius: 7px; padding: 6px 8px; font-size: 13px; text-align: right; font-family: 'Inter', sans-serif; outline: none; }
  .goals-fields input:focus { border-color: var(--accent); }
  .rest-picker { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 6px; }
  .rest-picker button { background: var(--surface-2); border: 1px solid var(--line); color: var(--text-dim); border-radius: 8px; padding: 8px 0; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .rest-picker button.sel { background: rgba(200,163,95,0.15); border-color: rgba(200,163,95,0.4); color: var(--rest); }

  .empty { text-align: center; color: var(--text-dim); font-size: 13px; padding: 14px; }
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#06243a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></div>
      <div><h1>Deep<span>Bloat</span></h1><div class="tagline">stay consistent, daily.</div></div>
    </div>
    <button class="gear-btn" id="gearBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <div id="content"></div>
</div>

<nav class="tab-bar">
  <button class="tab-btn" data-tab="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Today
  </button>
  <button class="tab-btn" data-tab="food">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3v18M4 8h6M10 3v18M16 3c-1.5 2-1.5 5 0 7v11"/></svg>
    Food
  </button>
  <button class="tab-btn" data-tab="weight">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 0 0-9 9h18a9 9 0 0 0-9-9z"/><path d="M12 12l3-4"/></svg>
    Weight
  </button>

<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

<script>
(function () {
  "use strict";
  var STORE_KEY = "deepbloat_v2";
  var DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var SECTIONS = ["Morning","Afternoon","Evening"];
  var ML_PER_GLASS = 250;

  var DEFAULT_TASKS = [
    { id: id(), section: "Morning",   label: "Breakfast (protein)", sub: "kick off the day's macros" },
    { id: id(), section: "Afternoon", label: "Weights workout", sub: "the daily non-negotiable" },
    { id: id(), section: "Afternoon", label: "Cardio: soccer / treadmill", sub: "eat back the burn" },
    { id: id(), section: "Evening",   label: "Log everything I ate", sub: "use the food tab" }
  ];
  var DEFAULT_GOALS = { cal: 1950, p: 147, f: 55, c: 215, sodium: 2300, potassium: 3500 };

  function id() { return Math.random().toString(36).slice(2, 9); }
  function num(v) { var n = parseFloat(v); return isNaN(n) ? 0 : n; }

  var state = load();
  var currentTab = "today";
  var weekOffset = 0;
  var selectedDay = todayIdxNow();
  var editing = false, showFoodForm = false;
  var photoStatus = null;
  var formDraft = null;
  var scanner = null;

  function load() {
    try { var raw = localStorage.getItem(STORE_KEY); if (raw) return migrate(JSON.parse(raw)); } catch (e) {}
    return base();
  }
  function base() {
    return { tasks: DEFAULT_TASKS, done: {}, restDay: 6, water: {}, waterGoal: 12, weighins: {},
             food: {}, goals: Object.assign({}, DEFAULT_GOALS), apiKey: "" };
  }
  function migrate(s) {
    if (!s.water) s.water = {};
    if (!s.waterGoal) s.waterGoal = 12;
    if (!s.weighins) s.weighins = {};
    if (!s.food) s.food = {};
    if (!s.goals) s.goals = Object.assign({}, DEFAULT_GOALS);
    if (s.goals.sodium == null) s.goals.sodium = DEFAULT_GOALS.sodium;
    if (s.goals.potassium == null) s.goals.potassium = DEFAULT_GOALS.potassium;
    if (s.apiKey == null) s.apiKey = "";
    if (s.done && s.weekStamp) {
      var oldMonday;
      try { oldMonday = parseYmd(s.weekStamp); } catch (e) { oldMonday = null; }
      if (oldMonday) {
        var newDone = {}, migrated = false;
        Object.keys(s.done).forEach(function (k) {
          var m = k.match(/^(\d):(.+)$/);
          if (m) { migrated = true;
            var idx = parseInt(m[1], 10);
            var d = new Date(oldMonday); d.setDate(oldMonday.getDate() + idx);
            newDone[ymd(d) + ":" + m[2]] = s.done[k];
          } else { newDone[k] = s.done[k]; }
        });
        if (migrated) s.done = newDone;
      }
    }
    return s;
  }
  function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {} }

  function todayIdxNow() { var js = new Date().getDay(); return js === 0 ? 6 : js - 1; }
  function viewedMonday() {
    var n = new Date(); n.setDate(n.getDate() - todayIdxNow() + weekOffset * 7); n.setHours(0,0,0,0); return n;
  }
  function dateForDay(i) { var m = viewedMonday(); var d = new Date(m); d.setDate(m.getDate() + i); return ymd(d); }
  function ymd(d) { return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function parseYmd(s) { var p = s.split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
  function diffDays(a, b) { return Math.round((parseYmd(b) - parseYmd(a)) / 86400000); }
  function todayYmd() { return ymd(new Date()); }
  function isTodayStr(d) { return d === todayYmd(); }
  function fmtDate(d) { return parseYmd(d).toLocaleString('en-US', { month: 'short', day: 'numeric' }); }
  function fmtDay(d) { return parseYmd(d).toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }); }

  function doneKey(date, taskId) { return date + ":" + taskId; }
  function isDone(date, taskId) { return !!state.done[doneKey(date, taskId)]; }
  function isRestIdx(i) { return i === state.restDay; }
  function tasksFor(sec) { return state.tasks.filter(function (t) { return t.section === sec; }); }
  function dayProgressForDate(date, rest) {
    if (rest) return null;
    var total = state.tasks.length; if (!total) return 0;
    var c = 0; state.tasks.forEach(function (t) { if (isDone(date, t.id)) c++; });
    return Math.round((c / total) * 100);
  }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
  function r1(x) { return Math.round(x * 10) / 10; }

  var contentEl = document.getElementById("content");
  var photoInput = document.getElementById("photoInput");

  function ring(pct) {
    var r = 11, c = 2 * Math.PI * r, off = c - (pct / 100) * c;
    var col = pct === 100 ? "var(--good)" : "var(--accent)";
    return '<div class="ring"><svg width="28" height="28" viewBox="0 0 28 28">' +
      '<circle cx="14" cy="14" r="' + r + '" fill="none" stroke="var(--surface-2)" stroke-width="3"/>' +
      '<circle cx="14" cy="14" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="3" stroke-linecap="round" stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '"/>' +
      '</svg><div class="pct-txt">' + pct + '</div></div>';
  }

  function weekNavEl() {
    var mon = viewedMonday(); var sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    var fmt = function (d) { return d.toLocaleString('en-US', { month: 'short', day: 'numeric' }); };
    var range = fmt(mon) + " – " + fmt(sun);
    var sub = weekOffset === 0 ? "This week"
            : weekOffset === -1 ? "Last week"
            : weekOffset === 1 ? "Next week"
            : weekOffset < 0 ? Math.abs(weekOffset) + " weeks ago"
            : weekOffset + " weeks ahead";
    var el = document.createElement("div");
    el.className = "week-nav";
    el.innerHTML = '<button class="nav-btn" id="prevWk">‹</button>' +
      '<div class="wk-label' + (weekOffset === 0 ? ' current' : '') + '" id="wkLabel">' + range + '<span class="sub">' + sub + '</span></div>' +
      '<button class="nav-btn" id="nextWk">›</button>';
    el.querySelector("#prevWk").onclick = function () { weekOffset--; selectedDay = 0; renderTab(); };
    el.querySelector("#nextWk").onclick = function () { weekOffset++; selectedDay = 0; renderTab(); };
    el.querySelector("#wkLabel").onclick = function () {
      if (weekOffset === 0) return;
      weekOffset = 0; selectedDay = todayIdxNow(); renderTab();
    };
    return el;
  }

  function weekStripEl() {
    var el = document.createElement("div");
    el.className = "week";
    DAYS.forEach(function (name, i) {
      var date = dateForDay(i);
      var rest = isRestIdx(i), today = isTodayStr(date);
      var d = document.createElement("div");
      d.className = "day" + (i === selectedDay ? " active" : "") + (rest ? " rest" : "") + (today ? " today" : "");
      var dayNum = parseYmd(date).getDate();
      var inner = '<div class="dname">' + name + '</div><div class="dnum">' + dayNum + '</div>';
      if (rest) {
        inner += '<div class="ring"><svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="11" fill="none" stroke="rgba(200,163,95,0.4)" stroke-width="3" stroke-dasharray="2 4"/></svg><div class="pct-txt" style="font-size:12px">∅</div></div>';
      } else { inner += ring(dayProgressForDate(date, false)); }
      d.innerHTML = inner;
      d.onclick = function () { selectedDay = i; editing = false; showFoodForm = false; formDraft = null; photoStatus = null; renderTab(); };
      el.appendChild(d);
    });
    return el;
  }

  function foodFor(date) { return state.food[date] || []; }
  function totals(date) {
    var t = { cal: 0, p: 0, f: 0, c: 0, sodium: 0, potassium: 0 };
    foodFor(date).forEach(function (e) {
      var q = e.qty || 1;
      t.cal += (e.cal || 0) * q; t.p += (e.p || 0) * q; t.f += (e.f || 0) * q; t.c += (e.c || 0) * q;
      t.sodium += (e.sodium || 0) * q; t.potassium += (e.potassium || 0) * q;
    });
    return t;
  }
  function fmtQty(q) { return q === 1 ? "" : ' <span class="qty">×' + (Math.round(q * 100) / 100) + '</span>'; }

  // ============ TODAY TAB ============
  function renderToday() {
    contentEl.appendChild(weekNavEl());
    contentEl.appendChild(weekStripEl());

    var date = dateForDay(selectedDay);
    var t = totals(date), g = state.goals;
    var water = state.water[date] || 0;
    var weight = state.weighins[date];

    // Quick stats row
    var qr = document.createElement("div");
    qr.className = "quick-row";
    qr.innerHTML =
      '<div class="quick-tile" data-go="food"><div class="qlabel">Calories</div><div class="qvalue">' + Math.round(t.cal) + '<small>/ ' + g.cal + '</small></div></div>' +
      '<div class="quick-tile" data-go="water-noop"><div class="qlabel">Water</div><div class="qvalue">' + water + '<small>/ ' + state.waterGoal + ' glasses</small></div></div>' +
      '<div class="quick-tile" data-go="weight"><div class="qlabel">Weight</div><div class="qvalue">' + (weight != null ? weight : '—') + '<small>' + (weight != null ? 'lb logged' : 'not logged') + '</small></div></div>';
    qr.querySelectorAll("[data-go]").forEach(function (b) {
      var t = b.getAttribute("data-go");
      b.onclick = function () { if (t === "food" || t === "weight") switchTab(t); };
    });
    contentEl.appendChild(qr);

    // Water quick controls
    var wc = document.createElement("div");
    wc.className = "card";
    wc.innerHTML = '<div class="card-head"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="var(--water)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5S5 10 5 15a7 7 0 0 0 14 0c0-5-7-12.5-7-12.5z"/></svg>Water</div></div>' +
      '<div class="water-ctrl"><button class="big" id="w_minus">−</button>' +
      '<div class="count"><b>' + water + ' / ' + state.waterGoal + '</b><span class="l">' + (water * ML_PER_GLASS / 1000).toFixed(2) + ' L · ' + ML_PER_GLASS + ' ml/glass</span></div>' +
      '<button class="big" id="w_plus">+</button></div>';
    wc.querySelector("#w_minus").onclick = function () { var c = state.water[date] || 0; if (c > 0) c--; state.water[date] = c; save(); renderTab(); };
    wc.querySelector("#w_plus").onclick = function () { state.water[date] = (state.water[date] || 0) + 1; save(); renderTab(); };
    contentEl.appendChild(wc);

    // Habits
    if (isRestIdx(selectedDay)) {
      var b = document.createElement("div"); b.className = "rest-banner";
      b.textContent = "Rest day. Recover, eat, let the muscle rebuild. 💤";
      contentEl.appendChild(b);
    } else {
      SECTIONS.forEach(function (sec) {
        var title = document.createElement("div"); title.className = "section-title";
        title.innerHTML = '<span class="dot"></span>' + sec; contentEl.appendChild(title);
        var list = tasksFor(sec);
        if (!list.length) { var em = document.createElement("div"); em.className = "empty"; em.textContent = "Nothing here yet."; contentEl.appendChild(em); }
        else { list.forEach(function (t) { contentEl.appendChild(taskNode(t)); }); }
        if (editing) {
          var row = document.createElement("div"); row.className = "add-row";
          row.innerHTML = '<input type="text" placeholder="Add to ' + sec + '..." /><button class="add-btn">+</button>';
          var inp = row.querySelector("input"), btn = row.querySelector(".add-btn");
          function add() { var v = inp.value.trim(); if (!v) return; state.tasks.push({ id: id(), section: sec, label: v, sub: "" }); save(); renderTab(); }
          btn.onclick = add; inp.onkeydown = function (e) { if (e.key === "Enter") add(); };
          contentEl.appendChild(row);
        }
      });
    }

    // Action row
    var ar = document.createElement("div");
    ar.className = "action-row";
    ar.innerHTML = '<button id="actEdit">' + (editing ? '✓ Done' : '✎ Edit habits') + '</button>' +
                   '<button class="primary" id="actReset">↺ Reset day</button>';
    ar.querySelector("#actEdit").onclick = function () { editing = !editing; renderTab(); };
    ar.querySelector("#actReset").onclick = function () {
      var label = DAYS[selectedDay] + " (" + fmtDate(date) + ")";
      if (!confirm("Clear all task checkmarks for " + label + "?")) return;
      state.tasks.forEach(function (t) { delete state.done[doneKey(date, t.id)]; });
      save(); renderTab();
    };
    contentEl.appendChild(ar);
  }

  function taskNode(t) {
    var date = dateForDay(selectedDay);
    var done = isDone(date, t.id);
    var el = document.createElement("div");
    el.className = "task" + (done ? " done" : "") + (editing ? " editing" : "");
    el.innerHTML = '<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#06243a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></div>' +
      '<div class="body"><div class="label">' + esc(t.label) + '</div>' + (t.sub ? '<div class="sub">' + esc(t.sub) + '</div>' : '') + '</div><button class="del">×</button>';
    el.onclick = function (e) {
      if (e.target.closest(".del")) { state.tasks = state.tasks.filter(function (x) { return x.id !== t.id; }); save(); renderTab(); return; }
      var k = doneKey(date, t.id);
      if (state.done[k]) delete state.done[k]; else state.done[k] = true;
      save(); el.classList.toggle("done");
      // refresh week strip rings
      var newStrip = weekStripEl(); contentEl.replaceChild(newStrip, contentEl.querySelector(".week"));
    };
    return el;
  }

  // ============ FOOD TAB ============
  function renderFood() {
    contentEl.appendChild(weekNavEl());
    contentEl.appendChild(weekStripEl());
    contentEl.appendChild(macroFullCard());
  }

  function macroFullCard() {
    var date = dateForDay(selectedDay);
    var g = state.goals, t = totals(date);
    var c = document.createElement("div");
    c.className = "card";

    function bar(val, goal, col) {
      var pct = goal > 0 ? Math.min(100, Math.round(val / goal * 100)) : 0;
      var over = val > goal && goal > 0;
      return '<div class="bar"><div style="width:' + pct + '%;background:' + (over ? 'var(--rest)' : col) + '"></div></div>';
    }
    var remain = Math.round(g.cal - t.cal);
    var inner = '<div class="card-head"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3v18M4 8h6M10 3v18M16 3c-1.5 2-1.5 5 0 7v11"/></svg>' + fmtDay(date) + '</div></div>' +
      '<div class="cal-line"><span class="big">' + Math.round(t.cal) + '<span class="goal"> / ' + g.cal + ' cal</span></span>' +
      '<span class="rem">' + (remain >= 0 ? remain + ' left' : Math.abs(remain) + ' over') + '</span></div>' +
      bar(t.cal, g.cal, 'var(--accent)') +
      '<div class="macro-grid">' +
        '<div class="macro"><div class="mname">Protein</div><div class="mval">' + r1(t.p) + '<small> / ' + g.p + 'g</small></div>' + bar(t.p, g.p, 'var(--p)') + '</div>' +
        '<div class="macro"><div class="mname">Fat</div><div class="mval">' + r1(t.f) + '<small> / ' + g.f + 'g</small></div>' + bar(t.f, g.f, 'var(--f)') + '</div>' +
        '<div class="macro"><div class="mname">Carbs</div><div class="mval">' + r1(t.c) + '<small> / ' + g.c + 'g</small></div>' + bar(t.c, g.c, 'var(--c)') + '</div>' +
      '</div>' +
      '<div class="micro-grid">' +
        '<div class="macro"><div class="mname">Sodium</div><div class="mval">' + Math.round(t.sodium) + '<small> / ' + g.sodium + 'mg</small></div>' + bar(t.sodium, g.sodium, 'var(--na)') + '</div>' +
        '<div class="macro"><div class="mname">Potassium</div><div class="mval">' + Math.round(t.potassium) + '<small> / ' + g.potassium + 'mg</small></div>' + bar(t.potassium, g.potassium, 'var(--k)') + '</div>' +
      '</div>' +
      '<div class="food-list"></div>';

    if (showFoodForm) {
      var d = formDraft || { name: "", qty: 1, cal: "", p: "", f: "", c: "", sodium: "", potassium: "" };
      var statusHtml = photoStatus ? '<div class="photo-status ' + (photoStatus.type || '') + '">' + photoStatus.msg + '</div>' : '';
      inner += '<div class="food-form">' +
        '<div class="photo-row">' +
          '<button class="photo-btn" id="snapBtn"><svg viewBox="0 0 24 24" fill="none" stroke="#06243a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Snap food</button>' +
          '<button class="photo-btn alt" id="barBtn"><svg viewBox="0 0 24 24" fill="none" stroke="#2a1f0d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5v14M7 5v14M11 5v14M15 5v14M19 5v14"/></svg>Scan barcode</button>' +
        '</div>' + statusHtml +
        '<input id="f_name" type="text" placeholder="Food name" value="' + esc(d.name) + '">' +
        '<div class="ff-grid">' +
          '<div><label>Servings</label><input id="f_qty" type="number" inputmode="decimal" step="any" value="' + d.qty + '"></div>' +
          '<div><label>Cal</label><input id="f_cal" type="number" inputmode="decimal" step="any" placeholder="0" value="' + d.cal + '"></div>' +
          '<div><label>Protein</label><input id="f_p" type="number" inputmode="decimal" step="any" placeholder="0" value="' + d.p + '"></div>' +
          '<div><label>Fat</label><input id="f_f" type="number" inputmode="decimal" step="any" placeholder="0" value="' + d.f + '"></div>' +
          '<div><label>Carbs</label><input id="f_c" type="number" inputmode="decimal" step="any" placeholder="0" value="' + d.c + '"></div>' +
        '</div>' +
        '<div class="ff-grid-2">' +
          '<div><label>Sodium mg</label><input id="f_na" type="number" inputmode="decimal" step="any" placeholder="0" value="' + d.sodium + '"></div>' +
          '<div><label>Potassium mg</label><input id="f_k" type="number" inputmode="decimal" step="any" placeholder="0" value="' + d.potassium + '"></div>' +
        '</div>' +
        '<div class="ff-actions"><button class="ff-cancel" id="f_cancel">Cancel</button><button class="ff-add" id="f_add">Add food</button></div>' +
        '</div>';
    } else {
      inner += '<div class="ff-actions" style="margin-top:12px"><button class="ff-add" id="f_open" style="flex:1;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;background:var(--accent);color:#06243a">+ Add food</button></div>';
    }
    c.innerHTML = inner;

    var list = foodFor(date);
    var listEl = c.querySelector(".food-list");
    if (!list.length) listEl.innerHTML = '<div class="food-empty">No food logged for this day.</div>';
    else {
      list.forEach(function (e) {
        var q = e.qty || 1;
        var row = document.createElement("div");
        row.className = "food";
        var micro = (e.sodium || e.potassium) ? '<div class="fmic">' + (e.sodium ? Math.round((e.sodium||0)*q) + ' mg Na' : '') + (e.sodium && e.potassium ? ' · ' : '') + (e.potassium ? Math.round((e.potassium||0)*q) + ' mg K' : '') + '</div>' : '';
        row.innerHTML = '<div class="fbody"><div class="fname">' + esc(e.name) + fmtQty(q) + '</div>' +
          '<div class="fmac"><b>' + Math.round((e.cal||0)*q) + '</b> cal · <b>' + r1((e.p||0)*q) + '</b>p · <b>' + r1((e.f||0)*q) + '</b>f · <b>' + r1((e.c||0)*q) + '</b>c</div>' + micro +
          '</div><button class="fdel">×</button>';
        row.querySelector(".fdel").onclick = function () {
          state.food[date] = foodFor(date).filter(function (x) { return x.id !== e.id; });
          if (!state.food[date].length) delete state.food[date];
          save(); renderTab();
        };
        listEl.appendChild(row);
      });
    }

    if (showFoodForm) {
      c.querySelector("#snapBtn").onclick = function () {
        if (!state.apiKey) { openSettings("key"); return; }
        photoInput.click();
      };
      c.querySelector("#barBtn").onclick = function () { openScanner(); };
      c.querySelector("#f_add").onclick = function () {
        var name = c.querySelector("#f_name").value.trim();
        if (!name) { c.querySelector("#f_name").focus(); return; }
        var entry = { id: id(), name: name, qty: num(c.querySelector("#f_qty").value) || 1,
          cal: num(c.querySelector("#f_cal").value), p: num(c.querySelector("#f_p").value),
          f: num(c.querySelector("#f_f").value), c: num(c.querySelector("#f_c").value),
          sodium: num(c.querySelector("#f_na").value), potassium: num(c.querySelector("#f_k").value) };
        if (!state.food[date]) state.food[date] = [];
        state.food[date].push(entry);
        save(); showFoodForm = false; formDraft = null; photoStatus = null; renderTab();
      };
      c.querySelector("#f_cancel").onclick = function () { showFoodForm = false; formDraft = null; photoStatus = null; renderTab(); };
    } else {
      c.querySelector("#f_open").onclick = function () { showFoodForm = true; photoStatus = null; renderTab(); };
    }
    return c;
  }

  // ============ WEIGHT TAB ============
  function renderWeight() {
    var today = todayYmd();
    var logged = state.weighins[today];

    // Today's weigh-in input
    var w = document.createElement("div");
    w.className = "card";
    w.innerHTML = '<div class="card-head"><div class="t"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 0 0-9 9h18a9 9 0 0 0-9-9z"/><path d="M12 12l3-4"/></svg>Today\'s weigh-in</div></div>' +
      '<div class="wi-input"><input type="number" inputmode="decimal" step="0.1" placeholder="' + (logged != null ? logged : 'e.g. 147.0') + '"><button>Save</button></div>' +
      (logged != null ? '<div class="wi-logged">Today: <b>' + logged + ' lb</b></div>' : '');
    var inp = w.querySelector("input"), btn = w.querySelector("button");
    btn.onclick = function () { var v = parseFloat(inp.value); if (isNaN(v) || v <= 0) return; state.weighins[today] = Math.round(v * 10) / 10; save(); renderTab(); };
    inp.onkeydown = function (e) { if (e.key === "Enter") btn.onclick(); };
    contentEl.appendChild(w);

    // 7-day check
    contentEl.appendChild(reviewCard());

    // Chart
    var entries = sortedWeighins();
    if (entries.length >= 2) contentEl.appendChild(chartCard(entries));

    // History
    if (entries.length) contentEl.appendChild(historyCard(entries));
    else {
      var em = document.createElement("div"); em.className = "empty";
      em.textContent = "No weigh-ins yet. Log one above to start your trend.";
      contentEl.appendChild(em);
    }
  }

  function sortedWeighins() { return Object.keys(state.weighins).sort().map(function (d) { return { date: d, w: state.weighins[d] }; }); }

  function reviewCard() {
    var entries = sortedWeighins(), c = document.createElement("div");
    c.className = "card";
    if (entries.length === 0) {
      c.innerHTML = '<div class="review"><div class="head">📊 Track your trend</div>Log your weight each morning. After 7 days I\'ll show how much you\'ve lost or gained.</div>';
      return c;
    }
    var first = entries[0], latest = entries[entries.length - 1];
    var spanFirst = diffDays(first.date, latest.date), today = ymd(new Date());
    var spanToday = diffDays(first.date, today), dayN = Math.max(spanToday + 1, entries.length);
    if (spanFirst < 7) {
      var prog = Math.min(dayN, 7);
      c.innerHTML = '<div class="review"><div class="head">📊 Day ' + prog + ' of 7</div>Keep logging each morning. ' + (7 - prog > 0 ? (7 - prog) + ' more day' + (7 - prog === 1 ? '' : 's') + ' until your first check.' : 'Time to check below!') + '<div class="progbar"><div style="width:' + Math.round(prog / 7 * 100) + '%"></div></div></div>';
      return c;
    }
    var target = parseYmd(latest.date); target.setDate(target.getDate() - 7); var targetStr = ymd(target);
    var bse = null, bestGap = 999;
    entries.forEach(function (e) { var gp = Math.abs(diffDays(e.date, targetStr)); if (gp < bestGap && e.date !== latest.date) { bestGap = gp; bse = e; } });
    if (!bse) bse = first;
    var delta = Math.round((latest.w - bse.w) * 10) / 10, days = diffDays(bse.date, latest.date);
    var dir = delta < 0 ? "down" : (delta > 0 ? "up" : ""), word = delta < 0 ? "down" : (delta > 0 ? "up" : "even"), absv = Math.abs(delta).toFixed(1);
    var note, perWeek = days > 0 ? (delta / days) * 7 : delta;
    if (delta < 0) {
      if (Math.abs(perWeek) > 1.2) note = "That's faster than your 0.5 lb/week goal — eat back a touch more so you keep muscle.";
      else if (Math.abs(perWeek) >= 0.3) note = "Right on pace for your ~0.5 lb/week cut. Hold steady.";
      else note = "Slow loss — solid for keeping muscle. Nudge calories down ~100 if you want it quicker.";
    } else if (delta > 0) { note = "Up over the week. If you're cutting, trim ~150–200 cal/day or double-check the calories you eat back."; }
    else { note = "Holding steady. If you want to lose, drop ~150 cal from your base."; }
    c.innerHTML = '<div class="review alert"><div class="head">📊 Your 7-day check</div>Weight is <span class="delta ' + dir + '">' + word + ' ' + absv + ' lb</span> over the last ' + days + ' days (' + bse.w + ' → ' + latest.w + ').<br>' + note + '</div>';
    return c;
  }

  function chartCard(entries) {
    var c = document.createElement("div");
    c.className = "card chart-card";
    var weights = entries.map(function (e) { return e.w; });
    var minW = Math.min.apply(null, weights), maxW = Math.max.apply(null, weights);
    var range = maxW - minW; if (range < 2) range = 2; // give vertical breathing room
    var pad = range * 0.15; var yMin = minW - pad, yMax = maxW + pad;
    var W = 480, H = 140, padL = 36, padR = 12, padT = 10, padB = 22;
    var iw = W - padL - padR, ih = H - padT - padB;
    var firstDate = parseYmd(entries[0].date).getTime();
    var lastDate = parseYmd(entries[entries.length - 1].date).getTime();
    var span = lastDate - firstDate; if (span === 0) span = 86400000;
    var pts = entries.map(function (e) {
      var t = parseYmd(e.date).getTime();
      var x = padL + ((t - firstDate) / span) * iw;
      var y = padT + (1 - (e.w - yMin) / (yMax - yMin)) * ih;
      return { x: x, y: y, w: e.w, d: e.date };
    });
    var pathD = pts.map(function (p, i) { return (i ? "L" : "M") + p.x.toFixed(1) + " " + p.y.toFixed(1); }).join(" ");
    var gridLines = "";
    for (var i = 0; i <= 3; i++) {
      var v = yMin + ((yMax - yMin) / 3) * (3 - i);
      var yy = padT + (i / 3) * ih;
      gridLines += '<line x1="' + padL + '" x2="' + (W - padR) + '" y1="' + yy + '" y2="' + yy + '" stroke="#272c34" stroke-width="1"/>';
      gridLines += '<text x="' + (padL - 6) + '" y="' + (yy + 3) + '" fill="#8b95a3" font-size="9" text-anchor="end" font-family="Inter">' + v.toFixed(1) + '</text>';
    }
    var dots = pts.map(function (p) {
      return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3.5" fill="#6DCFFB" stroke="#16191d" stroke-width="2"/>';
    }).join("");
    var startLbl = entries[0].date.slice(5);
    var endLbl = entries[entries.length - 1].date.slice(5);
    c.innerHTML = '<div class="card-head"><div class="t">📈 Weight trend</div><div class="meta">' + entries.length + ' entries</div></div>' +
      '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
        gridLines +
        '<path d="' + pathD + '" fill="none" stroke="#6DCFFB" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
        dots +
        '<text x="' + padL + '" y="' + (H - 5) + '" fill="#8b95a3" font-size="9" font-family="Inter">' + startLbl + '</text>' +
        '<text x="' + (W - padR) + '" y="' + (H - 5) + '" fill="#8b95a3" font-size="9" text-anchor="end" font-family="Inter">' + endLbl + '</text>' +
      '</svg>' +
      '<div class="chart-stats">' +
        '<div class="chart-stat"><div class="cl">Start</div><div class="cv">' + entries[0].w + '</div></div>' +
        '<div class="chart-stat"><div class="cl">Latest</div><div class="cv">' + entries[entries.length - 1].w + '</div></div>' +
        '<div class="chart-stat"><div class="cl">Change</div><div class="cv" style="color:' + (entries[entries.length-1].w < entries[0].w ? 'var(--good)' : entries[entries.length-1].w > entries[0].w ? 'var(--rest)' : 'var(--text)') + '">' + ((entries[entries.length-1].w - entries[0].w) >= 0 ? '+' : '') + r1(entries[entries.length-1].w - entries[0].w) + '</div></div>' +
      '</div>';
    return c;
  }

  function historyCard(entries) {
    var c = document.createElement("div");
    c.className = "card";
    c.innerHTML = '<div class="card-head"><div class="t">History</div></div>';
    var reversed = entries.slice().reverse();
    reversed.forEach(function (e) {
      var row = document.createElement("div");
      row.className = "hist-row";
      var d = parseYmd(e.date);
      var label = d.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + (isTodayStr(e.date) ? " · today" : "");
      row.innerHTML = '<div class="hdate">' + label + '</div><div style="display:flex;align-items:center"><div class="hw">' + e.w + ' lb</div><button class="hdel">×</button></div>';
      row.querySelector(".hdel").onclick = function () {
        if (!confirm("Delete weigh-in for " + label + "?")) return;
        delete state.weighins[e.date]; save(); renderTab();
      };
      c.appendChild(row);
    });
    return c;
  }

  // ============ PHOTO + BARCODE ============
  photoInput.onchange = function (e) {
    var file = e.target.files[0]; photoInput.value = "";
    if (!file) return;
    if (!state.apiKey) { openSettings("key"); return; }
    photoStatus = { msg: '<span class="spin"></span>Reading photo...', type: '' };
    if (currentTab !== "food") { switchTab("food"); showFoodForm = true; }
    renderTab();
    var reader = new FileReader();
    reader.onload = function () { analyzePhoto(reader.result); };
    reader.onerror = function () { photoStatus = { msg: "Couldn't read the photo.", type: "err" }; renderTab(); };
    reader.readAsDataURL(file);
  };

  function analyzePhoto(dataUrl) {
    var prompt = "This image shows either food or a nutrition label.\n\nIf it's a nutrition label, read the values for ONE serving as printed.\nIf it's food, identify it and estimate macros for the portion visible.\n\nRespond with ONLY a JSON object, no markdown, no extra text:\n{\"name\":\"short food name\",\"cal\":0,\"p\":0,\"f\":0,\"c\":0,\"sodium\":0,\"potassium\":0}\n\nNumbers can be decimals. cal = calories. p/f/c = grams of protein/fat/carbs. sodium and potassium in milligrams. Use 0 if a value is unknown. Keep name short.";
    fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "content-type": "application/json", "Authorization": "Bearer " + state.apiKey },
      body: JSON.stringify({ model: "gpt-4o-mini", max_tokens: 400,
        messages: [{ role: "user", content: [{ type: "text", text: prompt }, { type: "image_url", image_url: { url: dataUrl } }] }]
      })
    }).then(function (r) {
      if (!r.ok) return r.text().then(function (t) { throw new Error("API " + r.status + ": " + t.slice(0, 200)); });
      return r.json();
    }).then(function (data) {
      var txt = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || "";
      var m = txt.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("No JSON in response");
      var obj = JSON.parse(m[0]);
      formDraft = { name: obj.name || "", qty: 1,
        cal: obj.cal != null ? obj.cal : "", p: obj.p != null ? obj.p : "",
        f: obj.f != null ? obj.f : "", c: obj.c != null ? obj.c : "",
        sodium: obj.sodium != null ? obj.sodium : "", potassium: obj.potassium != null ? obj.potassium : "" };
      photoStatus = { msg: "✓ Filled in — review and tap Add food", type: "ok" };
      renderTab();
    }).catch(function (err) {
      var msg = err.message || String(err);
      if (msg.indexOf("401") >= 0 || msg.toLowerCase().indexOf("auth") >= 0 || msg.toLowerCase().indexOf("api key") >= 0) {
        photoStatus = { msg: "API key invalid. Open Settings to update.", type: "err" };
      } else { photoStatus = { msg: "Couldn't analyze: " + msg.slice(0, 100), type: "err" }; }
      renderTab();
    });
  }

  function openScanner() {
    if (typeof Html5Qrcode === "undefined") {
      photoStatus = { msg: "Scanner still loading. Try again in a moment.", type: "err" };
      renderTab(); return;
    }
    var m = document.createElement("div");
    m.className = "scan-modal";
    m.innerHTML = '<div class="scan-head"><h3>Scan barcode</h3><button id="scan_close">Close</button></div><div id="reader"></div><div class="scan-hint" id="scan_hint">Point the camera at the product barcode</div>';
    document.body.appendChild(m);
    var hint = m.querySelector("#scan_hint");
    scanner = new Html5Qrcode("reader");
    var closed = false;
    function shutdown() { if (closed) return; closed = true; try { scanner.stop().then(function () { scanner.clear(); }).catch(function () {}); } catch (e) {} m.remove(); scanner = null; }
    m.querySelector("#scan_close").onclick = shutdown;
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 280, height: 140 } },
      function (decodedText) { if (closed) return; hint.innerHTML = '<span class="spin"></span>Looking up barcode ' + esc(decodedText) + '...'; lookupBarcode(decodedText, shutdown); },
      function () {}
    ).catch(function () { hint.textContent = "Camera blocked. Allow camera access in settings."; hint.style.color = "#ff8f6b"; });
  }
  function lookupBarcode(code, done) {
    fetch("https://world.openfoodfacts.org/api/v0/product/" + encodeURIComponent(code) + ".json")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.status !== 1 || !data.product) throw new Error("Not found");
        var p = data.product, n = p.nutriments || {};
        function pick() { for (var i = 0; i < arguments.length; i++) { if (n[arguments[i]] != null) return n[arguments[i]]; } return 0; }
        var sodium_mg = pick("sodium_serving", "sodium_100g") * 1000;
        if (!sodium_mg) { var salt = pick("salt_serving", "salt_100g"); if (salt) sodium_mg = salt * 1000 / 2.5; }
        formDraft = { name: p.product_name || p.generic_name || "Item #" + code, qty: 1,
          cal: Math.round(pick("energy-kcal_serving", "energy-kcal_100g")),
          p: r1(pick("proteins_serving", "proteins_100g")), f: r1(pick("fat_serving", "fat_100g")),
          c: r1(pick("carbohydrates_serving", "carbohydrates_100g")),
          sodium: Math.round(sodium_mg), potassium: Math.round(pick("potassium_serving", "potassium_100g") * 1000) };
        var hasServing = n["energy-kcal_serving"] != null;
        photoStatus = { msg: "✓ " + esc(formDraft.name) + " — per " + (hasServing ? "serving (" + (p.serving_size || "1 serving") + ")" : "100g") + ". Adjust servings if needed.", type: "ok" };
        if (currentTab !== "food") { switchTab("food"); showFoodForm = true; }
        done(); renderTab();
      })
      .catch(function () {
        photoStatus = { msg: "Barcode " + code + " not found. Try the photo button or enter manually.", type: "err" };
        if (currentTab !== "food") { switchTab("food"); showFoodForm = true; }
        done(); renderTab();
      });
  }

  // ============ SETTINGS ============
  function openSettings(focusKey) {
    var m = document.createElement("div"); m.className = "settings-modal";
    var g = state.goals;
    var restBtns = DAYS.map(function (n, i) { return '<button data-rest="' + i + '"' + (i === state.restDay ? ' class="sel"' : '') + '>' + n + '</button>'; }).join("");
    m.innerHTML = '<div class="wrap">' +
      '<div class="settings-head"><h2>Settings</h2><button class="gear-btn" id="closeSet" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>' +
      '<div class="settings-section"><h3>Daily goals</h3>' +
        '<div class="goals-fields">' +
          '<div><label>Calories</label><input id="sg_cal" type="number" step="any" value="' + g.cal + '"></div>' +
          '<div><label>Protein g</label><input id="sg_p" type="number" step="any" value="' + g.p + '"></div>' +
          '<div><label>Fat g</label><input id="sg_f" type="number" step="any" value="' + g.f + '"></div>' +
          '<div><label>Carbs g</label><input id="sg_c" type="number" step="any" value="' + g.c + '"></div>' +
          '<div><label>Sodium mg</label><input id="sg_na" type="number" step="any" value="' + g.sodium + '"></div>' +
          '<div><label>Potassium mg</label><input id="sg_k" type="number" step="any" value="' + g.potassium + '"></div>' +
        '</div>' +
      '</div>' +
      '<div class="settings-section"><h3>Water</h3><div class="settings-card">' +
        '<div class="setting-row"><div class="sl">Daily glass goal</div>' +
        '<div class="stepper"><button id="wg_minus">−</button><span class="sv" id="wg_val">' + state.waterGoal + '</span><button id="wg_plus">+</button></div></div>' +
        '<div class="setting-row"><div class="sl">Glass size</div><div class="sv">' + ML_PER_GLASS + ' ml</div></div>' +
      '</div></div>' +
      '<div class="settings-section"><h3>Rest day</h3><div class="settings-card"><div class="rest-picker">' + restBtns + '</div></div></div>' +
      '<div class="settings-section"><h3>OpenAI API key</h3><div class="settings-card">' +
        '<p style="font-size:12px;color:var(--text-dim);margin-bottom:10px;line-height:1.5">For the photo → macros feature. Get one at <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--accent)">platform.openai.com/api-keys</a>. Stored only on this phone — never in the GitHub repo.</p>' +
        '<input id="sk_key" type="password" placeholder="sk-..." value="' + esc(state.apiKey || "") + '" style="width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px;font-family:monospace;font-size:13px;outline:none">' +
      '</div></div>' +
      '<div style="margin-top:20px;display:flex;gap:10px"><button id="setCancel" style="flex:1;background:var(--surface);border:1px solid var(--line);color:var(--text-dim);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter">Cancel</button><button id="setSave" style="flex:1;background:var(--accent);color:#06243a;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:Inter">Save</button></div>' +
    '</div>';
    document.body.appendChild(m);

    var wgVal = m.querySelector("#wg_val");
    var wg = state.waterGoal;
    m.querySelector("#wg_minus").onclick = function () { if (wg > 1) wg--; wgVal.textContent = wg; };
    m.querySelector("#wg_plus").onclick = function () { if (wg < 24) wg++; wgVal.textContent = wg; };
    var pickedRest = state.restDay;
    m.querySelectorAll("[data-rest]").forEach(function (b) {
      b.onclick = function () {
        pickedRest = parseInt(b.getAttribute("data-rest"), 10);
        m.querySelectorAll("[data-rest]").forEach(function (x) { x.classList.toggle("sel", parseInt(x.getAttribute("data-rest"), 10) === pickedRest); });
      };
    });
    function close() { m.remove(); }
    m.querySelector("#closeSet").onclick = close;
    m.querySelector("#setCancel").onclick = close;
    m.querySelector("#setSave").onclick = function () {
      state.goals = { cal: num(m.querySelector("#sg_cal").value), p: num(m.querySelector("#sg_p").value),
                      f: num(m.querySelector("#sg_f").value), c: num(m.querySelector("#sg_c").value),
                      sodium: num(m.querySelector("#sg_na").value), potassium: num(m.querySelector("#sg_k").value) };
      state.waterGoal = wg;
      state.restDay = pickedRest;
      state.apiKey = m.querySelector("#sk_key").value.trim();
      save(); close(); renderTab();
    };
    if (focusKey === "key") setTimeout(function () { m.querySelector("#sk_key").focus(); m.querySelector("#sk_key").scrollIntoView({ behavior: "smooth", block: "center" }); }, 100);
  }

  // ============ NAV ============
  function switchTab(t) {
    currentTab = t;
    if (t !== "food") { showFoodForm = false; formDraft = null; photoStatus = null; }
    document.querySelectorAll(".tab-btn").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-tab") === t);
    });
    renderTab();
    window.scrollTo(0, 0);
  }
  function renderTab() {
    contentEl.innerHTML = "";
    if (currentTab === "today") renderToday();
    else if (currentTab === "food") renderFood();
    else if (currentTab === "weight") renderWeight();
  }

  document.querySelectorAll(".tab-btn").forEach(function (b) {
    b.onclick = function () { switchTab(b.getAttribute("data-tab")); };
  });
  document.getElementById("gearBtn").onclick = function () { openSettings(); };

  // initial
  document.querySelector('.tab-btn[data-tab="today"]').classList.add("active");
  renderTab();
})();
</script>
</body>
</html>
